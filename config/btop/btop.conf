#? Config file for btop v. 1.4.6 — cide base IDE (monitoring arm of the explorer pane).
# Opinionated seed. NOTE: btop REWRITES this file on quit (persists in-TUI changes),
# so after live use `git diff config/btop/btop.conf` may show churn — reconcile or
# `git restore` intentional-only changes. (cide-design TODO: seed->state copy so the
# tracked file stays pristine, like tools that own their config.)

# Catppuccin Mocha — resolved from config/btop/themes/ (XDG_CONFIG_HOME=config via btop-wrap).
color_theme = "catppuccin_mocha"

# Use the terminal background (transparent) so it blends with cmux/ghostty.
theme_background = False
truecolor = True

# hjkl navigation — keyboard-first, matches helix/yazi muscle memory.
vim_keys = True

rounded_corners = True
graph_symbol = "braille"

# Boxes shown at startup (cpu mem net proc). Toggle live with 1-4.
shown_boxes = "cpu mem net proc"

# Refresh cadence — 2s is calm for an ambient monitor; drop to 1000 for build-watching.
update_ms = 2000

# Processes: sort by CPU, tree off (flat list reads faster in a narrow pane).
proc_sorting = "cpu lazy"
proc_tree = False
proc_per_core = False
proc_mem_bytes = True

# CPU: show per-core load graph + frequency.
cpu_graph_upper = "total"
check_temp = True
show_coretemp = True
cpu_bottom = False

# Network: auto-detect the active interface, scale to traffic.
net_auto = True

# Disks: show free space meters in the mem box.
show_disks = True
only_physical = True

# Don't background — we want it live in the pane.
background_update = True
