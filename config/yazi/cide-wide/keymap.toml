# cide base IDE — yazi keymap (prepend_keymap overrides defaults)
[[mgr.prepend_keymap]]
on   = "."
run  = "hidden toggle"
desc = "Toggle hidden files"

[[mgr.prepend_keymap]]
on   = "T"
run  = "plugin toggle-pane min-preview"
desc = "Toggle preview pane"

[[mgr.prepend_keymap]]
on   = ["g", "r"]
run  = "plugin cd-git-root"
desc = "Go to git repo root"

[[mgr.prepend_keymap]]
on   = ["g", "c"]
run  = "plugin vcs-files"
desc = "Show all git-changed files"

[[mgr.prepend_keymap]]
on   = "<C-e>"
run  = 'shell -- hx-wrap "$@"'
desc = "Open in helix (force, bypass opener)"
