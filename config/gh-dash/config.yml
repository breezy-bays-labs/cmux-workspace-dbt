# cide base IDE — gh-dash config (loaded via GH_DASH_CONFIG; never writes ~/.config).
# Repo-AGNOSTIC @me sections — the popular default. No hard-coded repo lists, so it never
# goes stale as repos come and go (fixes the old kata/zeroclaw/print-4ink clutter).
prSections:
  - title: My PRs
    filters: is:open author:@me
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
  - title: Recently Merged
    filters: is:merged author:@me

issuesSections:
  - title: My Issues
    filters: is:open author:@me sort:updated-desc
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me

defaults:
  preview:
    open: true
    width: 60
  prsLimit: 20
  issuesLimit: 20
  view: prs
  refetchIntervalMinutes: 30

repoPaths:
  default: ~/github/*     # locate local clones (enables checkout/branch actions)

pager:
  diff: delta
