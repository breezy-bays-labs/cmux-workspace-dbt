# .github/workflows/docs.yml — build + publish the ctide product docs (mdBook → Pages).
#
# HELD un-triggered at R0: workflow_dispatch only. The first real publish is the
# end-R2 checkpoint (roadmap §7); until then this exists so the publishing shape is
# settled and reviewable, without burning runs or going live prematurely.
# MDBOOK_VERSION is pinned (determinism rule 1).
name: docs

on:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  MDBOOK_VERSION: "0.4.40"

jobs:
  build:
    name: build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2
        with:
          tool: mdbook@${{ env.MDBOOK_VERSION }}
      - name: Build the book
        run: mdbook build docs/book
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v3
        with:
          path: docs/book/book

  # Deploy is wired but inert until the first publish (end-R2). When enabled, add a
  # `deploy` job here gated on `github.ref == 'refs/heads/main'` with pages: write +
  # id-token: write and actions/deploy-pages. Held out now to keep the surface minimal.
