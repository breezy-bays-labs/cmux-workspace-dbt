# cide.toml — cide workspace config (dogfood; the Rust cide will own this schema).
# Read today by bin/hq-wrap ([database]) and bin/cide-* ([ide]).

# ── IDE instance ─────────────────────────────────────────────────────────────
# A cide IDE instance = a named, coupled set of cmux workspaces (one per role/window).
# Coupling is FUNCTIONAL (the cide registry + a hidden description tag), so the visible
# workspace names can all be the SAME for human UX — they don't carry the join key.
#
#   name               IDE identity (default: repo/dir name); coupled workspaces share it as their visible name
#   layout             single-landscape | single-portrait | dual-landscape | dual-portrait | landscape-portrait
#   on_missing_window  reuse (open in an existing same-orientation window — right monitor, no drag)
#                      | new (always a fresh window — lands on the main monitor, drag once)
[ide]
name              = "cide-dbt"
layout            = "landscape-portrait"
on_missing_window = "reuse"

# This [ide] block is the implicit DEFAULT space (your repo baseline). `cide-space new
# <name>` BUILDS A FRESH space from this `layout` preset — new windows/panes/surfaces,
# self-contained (close/rm only ever touch that named space). `cide-space ls|use|current|
# close|rm` manage them; `cide-space new <name> --dry` prints the window plan first. The
# landscape-portrait preset = portrait artifact (helix) + landscape tools (yazi+agent /
# tig·lazygit·gh-dash·difft·cmux-diff / shell / just·notify). See lib/cide-layout.sh.

# ── Agents ───────────────────────────────────────────────────────────────────
# AI agent surfaces are first-class in cide, composed over cmux's native agent
# machinery (cmux hooks capture each session; the launch label rides along so the
# tab, the vault, and claude's /resume all match). Launch one with `cide-agent` in
# any tab — open a new cmux tab and run it again for parallel chats in the same pane.
# `cide-agent ls` is the vault (active vs dead sessions + time since last active);
# `cide-jump agent [label]` focuses an agent surface across monitors.
#
#   active     which agent types are enabled (v1: claude only; codex is on deck)
#   placement  where the agent pane lives — landscape | portrait | both
#              (honored once layout presets land, #21; today agents open in the
#               current surface)
[agents]
active    = ["claude"]
placement = "landscape"

# Per-agent launch setup. `command` + `args` are YOUR opinionated defaults; cide
# ships a SAFE default (no forced model, no skipped permissions) — add what you want
# per workspace, e.g. args = ["--model", "opus", "--dangerously-skip-permissions"].
# `name_flag` is how cide passes the session label so tab + session + vault match.
[agents.claude]
command   = "claude"
args      = []
name_flag = "--name"
resume_flag = "--resume"   # `cide-space open` relaunches a closed space's agent with
                           # `claude --name <label> --resume <checkpoint>` so the prior
                           # conversation continues (checkpoint captured at close).

# codex on the backburner (claude-only today); slot kept for its return:
# [agents.codex]
# command = "codex"
# args    = []

# ── Theme ────────────────────────────────────────────────────────────────────
# The active cide theme. `cide-theme <name>` applies config/themes/<name>.toml across all
# tools (helix/yazi/btop/delta/harlequin) + cmux/ghostty, and updates this value. Tools that
# use terminal ANSI colors (lazygit/tig/gh-dash) follow cmux/ghostty automatically.
# Seeded: catppuccin-mocha · tokyonight · nord · gruvbox.
[theme]
active = "catppuccin-mocha"

# ── Database target ──────────────────────────────────────────────────────────
# v1: ONE connection = ONE target. hq-wrap opens this when launched with no file
# argument (e.g. as a tab in the explorer pane). Opening a database FILE from yazi
# ignores this and opens that file instead.
#
#   adapter     duckdb | sqlite            (default: duckdb)
#   connection  path to a local db file, OR a URI (e.g. md:<db> for MotherDuck)
#   read_only   true | false              (default: false; duckdb only for now)
#
# Resolution order for the no-arg launch:
#   1. this [database].connection (explicit)            ← you set it
#   2. the derived dbt warehouse (profiles.yml)         ← auto, dbt workspaces
#   3. in-memory duckdb                                  ← fallback
#
# Egress: a local path is air-gapped. A remote URI (md:, …) is an EXPLICIT,
# documented opt-in — never silent. duckdb auto-extension-install is disabled via
# config/duckdb/cide-init.sql, so a missing extension fails loud instead of fetching.

[database]
# adapter    = "duckdb"
# connection = "warehouse/dev.duckdb"
# read_only  = false
